<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1400" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrowRx" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowTx" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowCtl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <marker id="arrowStruct" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="1400" fill="#fafafa"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">rtcom 架构图</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#64748b">组件层次 · 数据流向 · 扩展点</text>

  <!-- ============ LAYER 1: USER ============ -->
  <rect x="60" y="90" width="980" height="80" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="80" y="115" font-size="12" font-weight="700" fill="#475569">USER</text>
  <rect x="160" y="100" width="220" height="55" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="270" y="125" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">⌨ Keyboard</text>
  <text x="270" y="143" text-anchor="middle" font-size="11" fill="#64748b">stdin / TTY raw mode</text>
  <rect x="720" y="100" width="220" height="55" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="830" y="125" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">🖥 Terminal Display</text>
  <text x="830" y="143" text-anchor="middle" font-size="11" fill="#64748b">stdout + ANSI color</text>

  <!-- ============ LAYER 2: rtcom-cli ============ -->
  <rect x="60" y="200" width="980" height="70" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="80" y="225" font-size="12" font-weight="700" fill="#92400e">rtcom-cli (bin)</text>
  <text x="550" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">clap arg parser · profile loader · signal handler · entry point</text>
  <text x="550" y="263" text-anchor="middle" font-size="11" fill="#78716c">rtcom /dev/ttyUSB0 -b 115200 --log out.txt</text>

  <!-- ============ LAYER 3: rtcom-core ============ -->
  <rect x="60" y="300" width="720" height="540" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="80" y="325" font-size="13" font-weight="700" fill="#1d4ed8">rtcom-core (lib) — event-driven engine</text>

  <!-- stdin reader task -->
  <rect x="90" y="350" width="180" height="60" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="180" y="373" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">stdin reader task</text>
  <text x="180" y="391" text-anchor="middle" font-size="10" fill="#64748b">crossterm / nix raw</text>

  <!-- Command Key State Machine -->
  <rect x="90" y="430" width="180" height="70" rx="8" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="180" y="455" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Command Key SM</text>
  <text x="180" y="472" text-anchor="middle" font-size="10" fill="#64748b">Ctrl-T prefix parser</text>
  <text x="180" y="487" text-anchor="middle" font-size="10" fill="#64748b">→ Command enum</text>

  <!-- Event Bus (center) -->
  <rect x="310" y="360" width="200" height="120" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="410" y="390" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Event Bus</text>
  <text x="410" y="410" text-anchor="middle" font-size="11" fill="#78716c">tokio::broadcast</text>
  <text x="410" y="432" text-anchor="middle" font-size="10" fill="#475569">RxBytes · TxBytes</text>
  <text x="410" y="446" text-anchor="middle" font-size="10" fill="#475569">Command · UserInput</text>
  <text x="410" y="460" text-anchor="middle" font-size="10" fill="#475569">DeviceConnected/Disc</text>
  <text x="410" y="474" text-anchor="middle" font-size="10" fill="#475569">ConfigChanged</text>

  <!-- Session Orchestrator -->
  <rect x="550" y="350" width="200" height="60" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  <text x="650" y="373" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Session Orchestrator</text>
  <text x="650" y="391" text-anchor="middle" font-size="10" fill="#64748b">subscribe · dispatch · coordinate</text>

  <!-- Mapper Chain -->
  <rect x="550" y="430" width="200" height="110" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="650" y="453" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Mapper Chain</text>
  <text x="650" y="470" text-anchor="middle" font-size="10" fill="#64748b">trait Mapper { map_rx/tx }</text>
  <line x1="570" y1="478" x2="730" y2="478" stroke="#e2e8f0"/>
  <text x="650" y="494" text-anchor="middle" font-size="10" fill="#475569">• hex display</text>
  <text x="650" y="508" text-anchor="middle" font-size="10" fill="#475569">• timestamp</text>
  <text x="650" y="522" text-anchor="middle" font-size="10" fill="#475569">• line-ending map</text>
  <text x="650" y="536" text-anchor="middle" font-size="10" fill="#475569">• ANSI strip (log)</text>

  <!-- Terminal Writer -->
  <rect x="550" y="560" width="200" height="50" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="650" y="582" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Terminal Writer</text>
  <text x="650" y="597" text-anchor="middle" font-size="10" fill="#64748b">color · hex · flush</text>

  <!-- Serial Reader -->
  <rect x="90" y="680" width="320" height="60" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="250" y="703" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Serial Reader Task</text>
  <text x="250" y="721" text-anchor="middle" font-size="10" fill="#64748b">non-blocking read → Event::RxBytes</text>

  <!-- Serial Writer -->
  <rect x="440" y="680" width="320" height="60" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="600" y="703" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Serial Writer Task</text>
  <text x="600" y="721" text-anchor="middle" font-size="10" fill="#64748b">Event::TxBytes → device.write</text>

  <!-- Control Commands Handler -->
  <rect x="90" y="770" width="670" height="55" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="425" y="792" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">Control Handler</text>
  <text x="425" y="810" text-anchor="middle" font-size="10" fill="#78716c">set_baud · toggle_dtr/rts · send_break · reconfigure · quit</text>

  <!-- ============ SUPPORT CRATES (right sidecar) ============ -->
  <rect x="810" y="300" width="230" height="540" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="830" y="325" font-size="12" font-weight="700" fill="#6d28d9">Support crates</text>

  <rect x="830" y="345" width="190" height="50" rx="6" fill="#ffffff" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="925" y="365" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">rtcom-config</text>
  <text x="925" y="382" text-anchor="middle" font-size="10" fill="#64748b">TOML · profiles · serde</text>

  <rect x="830" y="410" width="190" height="50" rx="6" fill="#ffffff" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="925" y="430" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">rtcom-log</text>
  <text x="925" y="447" text-anchor="middle" font-size="10" fill="#64748b">file · rotate · strip ANSI</text>

  <rect x="830" y="475" width="190" height="50" rx="6" fill="#ffffff" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="925" y="495" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">rtcom-xfer</text>
  <text x="925" y="512" text-anchor="middle" font-size="10" fill="#64748b">xmodem · ymodem · ascii</text>

  <rect x="830" y="540" width="190" height="50" rx="6" fill="#ffffff" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="925" y="560" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">rtcom-script</text>
  <text x="925" y="577" text-anchor="middle" font-size="10" fill="#64748b">mlua · triggers (feature)</text>

  <rect x="830" y="610" width="190" height="60" rx="6" fill="#fef9c3" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="925" y="630" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">future: rtcom-net</text>
  <text x="925" y="647" text-anchor="middle" font-size="10" fill="#64748b">TCP/Unix socket share</text>
  <text x="925" y="662" text-anchor="middle" font-size="10" fill="#78716c">(v0.7)</text>

  <rect x="830" y="685" width="190" height="60" rx="6" fill="#fef9c3" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="925" y="705" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">future: rtcom-proto</text>
  <text x="925" y="722" text-anchor="middle" font-size="10" fill="#64748b">SLIP · COBS · Modbus</text>
  <text x="925" y="737" text-anchor="middle" font-size="10" fill="#78716c">(v1.0+)</text>

  <text x="925" y="775" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">All subscribe to Event Bus</text>
  <text x="925" y="790" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">via broadcast channel</text>

  <!-- ============ LAYER 4: SerialDevice trait ============ -->
  <rect x="60" y="870" width="980" height="60" rx="10" fill="#ecfccb" stroke="#65a30d" stroke-width="1.5"/>
  <text x="80" y="895" font-size="12" font-weight="700" fill="#365314">SerialDevice trait (abstraction)</text>
  <text x="550" y="915" text-anchor="middle" font-size="12" fill="#1e293b">AsyncRead + AsyncWrite · set_baud_rate · set_dtr/rts · send_break · status()</text>

  <!-- ============ LAYER 5: serialport crate ============ -->
  <rect x="60" y="960" width="980" height="55" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="550" y="982" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">serialport crate (cross-platform)</text>
  <text x="550" y="1000" text-anchor="middle" font-size="11" fill="#64748b">+ udev (Linux hotplug) · + IOKit (macOS) · + SetupAPI (Windows)</text>

  <!-- ============ LAYER 6: OS ============ -->
  <rect x="60" y="1045" width="980" height="55" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <text x="550" y="1067" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">OS Layer</text>
  <text x="550" y="1085" text-anchor="middle" font-size="11" fill="#64748b">Linux/BSD termios · macOS IOKit · Windows Win32 COM API</text>

  <!-- ============ LAYER 7: Hardware ============ -->
  <rect x="60" y="1130" width="980" height="70" rx="10" fill="#1e293b" stroke="#0f172a" stroke-width="1.5"/>
  <text x="550" y="1155" text-anchor="middle" font-size="14" font-weight="700" fill="#fafafa">Hardware</text>
  <text x="550" y="1175" text-anchor="middle" font-size="11" fill="#cbd5e1">USB-Serial (CP210x, FTDI, CH340) · MCU UART · SoC debug UART</text>
  <text x="550" y="1190" text-anchor="middle" font-size="11" fill="#cbd5e1">/dev/ttyUSB* · /dev/ttyACM* · /dev/serial/by-id/* · COM3</text>

  <!-- ============ DATA FLOW ARROWS ============ -->

  <!-- TX: Keyboard → stdin reader (crosses CLI layer) -->
  <line x1="270" y1="155" x2="270" y2="200" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowTx)"/>
  <line x1="270" y1="270" x2="180" y2="350" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowTx)"/>

  <!-- stdin reader → Command Key SM -->
  <line x1="180" y1="410" x2="180" y2="430" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowTx)"/>

  <!-- Command Key SM → Event Bus -->
  <line x1="270" y1="465" x2="310" y2="430" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowTx)"/>

  <!-- Event Bus ↔ Session Orchestrator -->
  <line x1="510" y1="400" x2="550" y2="380" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowStruct)"/>
  <line x1="550" y1="395" x2="510" y2="430" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowStruct)"/>

  <!-- Event Bus → Mapper Chain (RX) -->
  <line x1="510" y1="450" x2="550" y2="470" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowRx)"/>

  <!-- Mapper Chain → Terminal Writer -->
  <line x1="650" y1="540" x2="650" y2="560" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowRx)"/>

  <!-- Terminal Writer → Terminal Display (up through CLI) -->
  <line x1="830" y1="560" x2="830" y2="270" stroke="#16a34a" stroke-width="2"/>
  <line x1="830" y1="560" x2="750" y2="585" stroke="#16a34a" stroke-width="2"/>
  <line x1="830" y1="200" x2="830" y2="155" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowRx)"/>

  <!-- Serial Reader → Event Bus (RX upward) -->
  <line x1="250" y1="680" x2="360" y2="480" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowRx)"/>

  <!-- Event Bus → Serial Writer (TX downward) -->
  <line x1="460" y1="480" x2="600" y2="680" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowTx)"/>

  <!-- Control Handler ↔ Event Bus -->
  <line x1="410" y1="770" x2="410" y2="480" stroke="#ea580c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowCtl)"/>

  <!-- Serial Reader ↓ to SerialDevice -->
  <line x1="250" y1="840" x2="250" y2="870" stroke="#16a34a" stroke-width="2"/>
  <!-- Serial Writer ↓ to SerialDevice -->
  <line x1="600" y1="840" x2="600" y2="870" stroke="#2563eb" stroke-width="2"/>

  <!-- SerialDevice → serialport -->
  <line x1="550" y1="930" x2="550" y2="960" stroke="#64748b" stroke-width="2" marker-end="url(#arrowStruct)"/>
  <!-- serialport → OS -->
  <line x1="550" y1="1015" x2="550" y2="1045" stroke="#64748b" stroke-width="2" marker-end="url(#arrowStruct)"/>
  <!-- OS ↔ Hardware -->
  <line x1="500" y1="1100" x2="500" y2="1130" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowRx)"/>
  <line x1="600" y1="1130" x2="600" y2="1100" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowTx)"/>

  <!-- Support crates dashed link to Session -->
  <line x1="810" y1="550" x2="755" y2="480" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowStruct)"/>

  <!-- ============ LEGEND ============ -->
  <rect x="60" y="1230" width="980" height="150" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="80" y="1255" font-size="13" font-weight="700" fill="#0f172a">图例 / Legend</text>

  <!-- TX flow -->
  <line x1="85" y1="1280" x2="125" y2="1280" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowTx)"/>
  <text x="135" y="1284" font-size="12" fill="#1e293b" font-weight="600">TX 流:键盘输入 → 串口</text>

  <!-- RX flow -->
  <line x1="85" y1="1305" x2="125" y2="1305" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowRx)"/>
  <text x="135" y="1309" font-size="12" fill="#1e293b" font-weight="600">RX 流:串口 → 终端显示 / 日志</text>

  <!-- Control flow -->
  <line x1="85" y1="1330" x2="125" y2="1330" stroke="#ea580c" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arrowCtl)"/>
  <text x="135" y="1334" font-size="12" fill="#1e293b" font-weight="600">控制流:命令 → 改配置 / DTR / RTS / Break</text>

  <!-- Structure -->
  <line x1="85" y1="1355" x2="125" y2="1355" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowStruct)"/>
  <text x="135" y="1359" font-size="12" fill="#1e293b" font-weight="600">结构调用 / 依赖关系</text>

  <!-- Right side legend -->
  <rect x="570" y="1270" width="18" height="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="595" y="1284" font-size="12" fill="#1e293b">rtcom-core(核心引擎)</text>

  <rect x="570" y="1295" width="18" height="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="595" y="1309" font-size="12" fill="#1e293b">support crates(按 feature 装配)</text>

  <rect x="570" y="1320" width="18" height="18" fill="#fef9c3" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="595" y="1334" font-size="12" fill="#1e293b">future crates(v0.7+ / v1.0+ 扩展)</text>

  <rect x="570" y="1345" width="18" height="18" fill="#ecfccb" stroke="#65a30d" stroke-width="1.5"/>
  <text x="595" y="1359" font-size="12" fill="#1e293b">跨平台抽象层(替换点)</text>
</svg>
