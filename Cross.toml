# cross-rs config for non-native release targets.
#
# rtcom-core depends on `serialport` whose `libudev` feature wants the
# udev development headers in the *target* architecture. The default
# cross images ship the host arch only, so we add the foreign arch +
# install libudev-dev:<arch> before the build.
[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get --assume-yes install libudev-dev:$CROSS_DEB_ARCH pkg-config",
]
